services:
  front:
    container_name: streamlit
    build:
      dockerfile: Dockerfile
      context: .
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    command: /bin/bash
    tty: true
